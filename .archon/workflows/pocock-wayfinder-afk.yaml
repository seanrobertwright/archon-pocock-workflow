name: pocock-wayfinder-afk
description: |
  Use when: A wayfinder map exists (charted interactively with /wayfinder) and
  you want its AFK-able frontier worked overnight — research legwork and
  agent-driveable tasks cleared so your next human session starts on sharper
  ground.
  Input: The map issue number or URL (labelled wayfinder:map)
  Output: Research/task tickets on the frontier claimed, resolved, closed, and
  indexed into the map's "Decisions so far"; a summary of what remains HITL.

  Faithful to v1.1 wayfinder's own ticket typing:
  - RESOLVES  wayfinder:research (AFK by definition) and wayfinder:task
              tickets the agent can complete alone
  - NEVER touches wayfinder:grilling or wayfinder:prototype tickets — those
    are HITL: "the agent never stands in for the human's side of it"
  - One ticket per iteration, fresh context each time ("never resolve more
    than one ticket per session"), claim-by-assignment so parallel human
    sessions coexist safely

  Run with --no-worktree: wayfinding produces decisions on the tracker and
  linked research assets, not feature code.

  NOT for: charting a map (interactive /wayfinder), executing the destination
  (that's /to-spec -> pocock-spec-to-ship once the way is clear).

provider: claude
model: sonnet

nodes:
  - id: load-map
    prompt: |
      Locate and verify the wayfinder map. Input: $ARGUMENTS

      Resolve the input to a GitHub issue (`gh issue view <n> --json number,title,labels,body`).
      Verify it carries the `wayfinder:map` label — if not, search open issues
      labelled `wayfinder:map` and match by the input text; if still ambiguous,
      fail with a clear message listing the maps you found.

      Read the map body (Destination, Notes, Decisions so far, Not yet
      specified, Out of scope). Write $ARTIFACTS_DIR/map.md with the map's
      number, title, and full body.
    context: fresh
    output_format:
      type: object
      properties:
        map_number:
          type: number
        map_title:
          type: string
        destination:
          type: string
      required: [map_number, map_title]

  - id: work-afk-frontier
    depends_on: [load-map]
    idle_timeout: 900000
    loop:
      prompt: |
        FRESH session — no memory of previous iterations. Your run log is
        $ARTIFACTS_DIR/wayfinder-log.md (create on first use).

        You are working the AFK slice of a wayfinder map. Read
        .claude/skills/wayfinder/SKILL.md and follow it EXACTLY — especially
        "Refer by name", "Fog of war", and the "Work through the map" steps.
        Read docs/agents/issue-tracker.md for how this repo expresses child
        issues, blocking, and frontier queries.

        The map: issue #$load-map.output.map_number ("$load-map.output.map_title").
        Destination: $load-map.output.destination

        1. Load the map fresh from the tracker (it may have changed — humans
           work this map in parallel). Read $ARTIFACTS_DIR/wayfinder-log.md.
        2. Compute the FRONTIER: open, unblocked, UNCLAIMED (no assignee)
           child tickets of the map. Keep only tickets you may work AFK:
           - `wayfinder:research` — always yours
           - `wayfinder:task` — only if the agent can genuinely complete it
             alone (no credentials to acquire from a human, no external
             sign-ups, no judgment call reserved for the human)
           NEVER take `wayfinder:grilling` or `wayfinder:prototype` tickets —
           those resolve only through a live human exchange. Never take a
           ticket the log shows you already attempted.
        3. If the AFK frontier is empty: <promise>AFK_FRONTIER_CLEAR</promise>
           and stop.
        4. Take ONE ticket. CLAIM IT FIRST: assign it to yourself
           (`gh issue edit <n> --add-assignee @me`) before any work.
        5. Resolve it per its type:
           - research: investigate against high-trust PRIMARY sources (read
             .claude/skills/research/SKILL.md for the discipline). Write the
             cited markdown summary to docs/research/<slug>.md, commit it to
             the current branch, and link it from the ticket.
           - task: do the work; the answer records what was done and the
             facts later tickets depend on (locations, URLs, counts).
           A ticket produces a DECISION or FINDING, not the destination
           itself — "plan, don't do".
        6. Record the resolution per the skill: post the answer as a
           resolution comment (starting with
           `> *This was generated by AI during an Archon workflow run.*`),
           CLOSE the ticket, and append a one-line context pointer to the
           map's "Decisions so far" — referring to the ticket by NAME with
           the link riding inside it, never a bare number.
        7. Graduate fog: if the answer makes something in "Not yet specified"
           precisely stateable, create the new child ticket(s), wire blocking
           edges in a second pass, and clear the graduated patch from the map.
           Type new tickets honestly — most will be grilling (HITL), and
           that's fine: you're sharpening the human's frontier, not taking it.
           If the answer shows a ticket sits beyond the destination, rule it
           out of scope per the skill (close + Out of scope line).
        8. If you claimed a task ticket in step 4 and THEN discover it needs a
           human after all: unassign yourself, comment with a precise
           checklist of what the human must do, log it, and end the iteration.
        9. Append to the log: ticket name, type, outcome. End the iteration
           WITHOUT the promise.

        Hard cap: if the log lists 8 resolved tickets, output
        <promise>AFK_FRONTIER_CLEAR</promise> instead of taking more.
      until: AFK_FRONTIER_CLEAR
      max_iterations: 10
      fresh_context: true

  - id: summary
    prompt: |
      Read $ARTIFACTS_DIR/wayfinder-log.md and re-fetch the map
      (issue #$load-map.output.map_number) from the tracker.

      Produce the human's next-session briefing and write it to
      $ARTIFACTS_DIR/wayfinder-summary.md, then output it:
      - Decisions resolved this run (by name, one-line gist each)
      - New tickets graduated from the fog (by name and type)
      - The HITL frontier now waiting: open grilling/prototype tickets, and
        any task tickets handed back with a human checklist
      - Whether the way to the destination looks clear enough to head to
        /to-spec, in one sentence
    depends_on: [work-afk-frontier]
    context: fresh
