name: pocock-triage
description: |
  Use when: Bugs and requests are piling up on the tracker and you want the
  queue worked AFK — Pocock's /triage on-ramp, run conservatively.
  Input: Optional focus, e.g. "#42", "only bugs", or empty for the whole queue
  Output: Queue items verified and moved through the triage state machine,
  with agent briefs on everything that reaches ready-for-agent.

  Conservative AFK rules (the interactive skill waits for maintainer direction;
  this run cannot, so it never takes irreversible actions):
  - CAN verify claims, reproduce bugs, apply needs-info with specific questions,
    write agent briefs, apply ready-for-agent / ready-for-human when justified
  - CANNOT close anything or apply wontfix — it posts a recommendation comment
    and leaves the state role for the maintainer
  - Grilling steps degrade to recorded open questions (no human to interview)

  Issues that reach ready-for-agent are exactly what pocock-fix-bug and
  pocock-spec-to-ship pick up later.

  Run with --no-worktree: triage writes to the tracker, not the working tree.

  NOT for: tickets created by /to-tickets (already agent-ready — never triage
  them), deciding wontfix (maintainer call).

provider: claude
model: sonnet

nodes:
  - id: read-config
    bash: |
      for f in docs/agents/issue-tracker.md docs/agents/triage-labels.md; do
        if [ -f "$f" ]; then echo "=== $f ==="; cat "$f"; fi
      done
      [ -f docs/agents/triage-labels.md ] || { echo "MISSING docs/agents/triage-labels.md — run pocock-init first"; exit 1; }
    timeout: 10000

  - id: triage-queue
    depends_on: [read-config]
    idle_timeout: 900000
    loop:
      prompt: |
        FRESH session — no memory of previous iterations. Your run log is
        $ARTIFACTS_DIR/triage-log.md (create it on first use).

        You are running Matt Pocock's triage skill conservatively and AFK.
        Read .claude/skills/triage/SKILL.md, AGENT-BRIEF.md, and OUT-OF-SCOPE.md
        and follow them, with the conservative deltas below.

        Tracker config: $read-config.output
        Maintainer focus (may be empty): $ARGUMENTS

        1. Read $ARTIFACTS_DIR/triage-log.md — never re-process an item logged there.
        2. Build the skill's three buckets (unlabeled; needs-triage; needs-info
           with reporter activity since last triage notes), oldest first,
           honoring the maintainer focus. Skip anything carrying this repo's
           ready-for-agent/ready-for-human label strings, and anything whose
           title/labels mark it as produced by /to-tickets (never triage those).
           If every bucket is empty: <promise>QUEUE_CLEAR</promise> and stop.
        3. Take ONE item. Follow the skill: gather full context, run the
           redundancy and prior-rejection checks, VERIFY the claim (reproduce
           the bug / confirm a PR's diff does what it says).
        4. Apply the conservative outcome:
           - Fully specified + verified, delegable   -> ready-for-agent + agent brief per AGENT-BRIEF.md
           - Fully specified but needs human judgment -> ready-for-human + brief noting why
           - Open questions remain                    -> needs-info + the skill's Triage Notes template
           - Looks like wontfix or already-implemented -> DO NOT CLOSE. Comment with
             your recommendation and evidence (code paths, .out-of-scope match),
             leave/apply needs-triage, flag for the maintainer.
           Always exactly one category role (bug/enhancement) and one state role.
           Every comment starts with:
           `> *This was generated by AI during triage.*`
        5. Append to $ARTIFACTS_DIR/triage-log.md: item, verification result,
           outcome, labels applied. Then end the iteration WITHOUT the promise.

        Hard cap: if the log already lists 10 processed items, output
        <promise>QUEUE_CLEAR</promise> instead of processing more.
      until: QUEUE_CLEAR
      max_iterations: 12
      fresh_context: true

  - id: summary
    prompt: |
      Read $ARTIFACTS_DIR/triage-log.md and produce the maintainer's morning
      summary: counts per outcome, items now ready-for-agent (these can be fed
      to pocock-fix-bug / pocock-spec-to-ship), items awaiting reporter info,
      and — most important — items flagged for a maintainer decision
      (wontfix/already-implemented recommendations), each with its one-line
      reason. Write it to $ARTIFACTS_DIR/triage-summary.md and output it.
    depends_on: [triage-queue]
    context: fresh
