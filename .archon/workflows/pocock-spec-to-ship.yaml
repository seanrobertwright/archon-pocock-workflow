name: pocock-spec-to-ship
description: |
  Use when: A spec exists (produced by an interactive /grill-with-docs + /to-spec
  session, or any agreed spec issue/file) and you want it built end to end, AFK.
  Input: Spec issue number, spec file path, or inline spec text
  Output: PR against the base branch — tickets implemented test-first, two-axis
  reviewed, review findings fixed.

  Matt Pocock's main flow (v1.1), back half:
  1. /to-tickets     — spec -> tracer-bullet GitHub issues with blocking edges
  2. /implement      — work the frontier, one ticket per fresh context, driving
                       /tdd at the ticket's seams and closing each ticket with a
                       per-ticket /code-review before committing
  3. validate        — full suite, made green if red
  4. /code-review    — two-axis final review (Standards | Spec) as parallel,
                       isolated nodes, then fix findings
  5. PR              — spec-linked, review summary included

  The grilling front-half is deliberately NOT here: misalignment is fixed by a
  human interview (/grill-with-docs), which happens interactively before this
  workflow is launched. Do not feed this workflow a raw idea — grill it first.

  NOT for: raw ungrilled ideas, quick fixes (archon-assist), bug hunts (pocock-fix-bug).

provider: claude
model: sonnet

nodes:
  # ── PHASE 0: CONFIG ──────────────────────────────────────────────
  - id: read-config
    bash: |
      for f in docs/agents/issue-tracker.md docs/agents/triage-labels.md CONTEXT.md; do
        if [ -f "$f" ]; then echo "=== $f ==="; cat "$f"; fi
      done
      [ -f docs/agents/issue-tracker.md ] || { echo "MISSING docs/agents/issue-tracker.md — run pocock-init first"; exit 1; }
    timeout: 10000

  # ── PHASE 1: SPEC -> TICKETS ─────────────────────────────────────
  - id: to-tickets
    command: pocock-to-tickets
    depends_on: [read-config]
    skills:
      - to-tickets
      - domain-modeling
    context: fresh
    output_format:
      type: object
      properties:
        run_label:
          type: string
          description: The workflow-$WORKFLOW_ID label applied to every ticket
        parent_spec:
          type: string
          description: Issue number or path of the originating spec
        tickets:
          type: array
          items:
            type: object
            properties:
              number:
                type: number
              title:
                type: string
              blocked_by:
                type: array
                items:
                  type: number
            required: [number, title]
      required: [run_label, tickets]

  # ── PHASE 2: WORK THE FRONTIER ───────────────────────────────────
  # One ticket per iteration, fresh context each time — Pocock's
  # "kick off /implement per ticket, clearing context between each one".
  - id: implement-frontier
    depends_on: [to-tickets]
    idle_timeout: 900000
    loop:
      prompt: |
        FRESH session — you have no memory of previous iterations. State lives
        on the issue tracker and in git.

        This run's tickets (JSON): $to-tickets.output

        1. Read docs/agents/issue-tracker.md, docs/agents/triage-labels.md and
           CONTEXT.md (if present). Respect ADRs in docs/adr/ for areas you touch.
        2. Find the FRONTIER: tickets from the JSON above that are still OPEN
           (`gh issue view <n> --json state`) and whose blocked_by tickets are
           all CLOSED. If no open tickets remain: <promise>FRONTIER_CLEAR</promise>
           and stop.
        3. Pick ONE frontier ticket (lowest number first). Read its full body
           and comments.
        4. Implement it with the tdd skill: read .claude/skills/tdd/SKILL.md,
           tests.md and mocking.md, and follow them exactly. The ticket's
           acceptance criteria define the pre-agreed seams — test only at those
           seams, red before green, one vertical slice at a time. Run the
           typechecker regularly and the relevant single test files as you go.
        5. Close out the ticket with a per-ticket review: read
           .claude/skills/code-review/SKILL.md and run its two axes against
           `git diff` of your uncommitted work — Standards (repo standards +
           smell baseline) and Spec (this ticket's body). Fix what warrants
           fixing.
        6. Commit to the current branch with a message referencing the ticket
           (`#<n>`). Close the ticket with a short comment starting with:
           `> *This was generated by AI during an Archon workflow run.*`
        7. End this iteration WITHOUT the promise — the next iteration picks up
           the next frontier ticket.

        Never skip a blocked ticket's blockers. Never work two tickets in one
        iteration.
      until: FRONTIER_CLEAR
      max_iterations: 25
      fresh_context: true
      until_bash: |
        open=$(gh issue list --label "workflow-$WORKFLOW_ID" --state open --json number --jq 'length' 2>/dev/null || echo 1)
        [ "$open" = "0" ]

  # ── PHASE 3: VALIDATE ────────────────────────────────────────────
  - id: validate
    command: pocock-validate
    depends_on: [implement-frontier]
    context: fresh
    output_format:
      type: object
      properties:
        verdict:
          type: string
          enum: [GREEN, RED]
      required: [verdict]

  - id: make-green
    depends_on: [validate]
    when: "$validate.output.verdict == 'RED'"
    idle_timeout: 900000
    loop:
      prompt: |
        The validation suite is red. Read $ARTIFACTS_DIR/validation.md for the
        exact commands and failures. Fix the failures — smallest change that
        makes the suite genuinely pass; never weaken or delete a test to get
        green unless the test itself is wrong, and say so in the commit message
        if you do. Re-run the recorded commands. When everything passes, commit
        the fixes and output: <promise>SUITE_GREEN</promise>
      until: SUITE_GREEN
      max_iterations: 6
      fresh_context: false

  # ── PHASE 4: TWO-AXIS FINAL REVIEW (parallel, isolated) ──────────
  - id: review-standards
    command: pocock-review-standards
    depends_on: [validate, make-green]
    trigger_rule: none_failed_min_one_success
    skills:
      - code-review
      - codebase-design
    context: fresh

  - id: review-spec
    command: pocock-review-spec
    depends_on: [validate, make-green]
    trigger_rule: none_failed_min_one_success
    skills:
      - code-review
    context: fresh

  - id: fix-findings
    command: pocock-fix-review-findings
    depends_on: [review-standards, review-spec]
    skills:
      - tdd
      - code-review
    context: fresh

  # ── PHASE 5: PR ──────────────────────────────────────────────────
  - id: create-pr
    command: pocock-create-pr
    depends_on: [fix-findings]
    context: fresh
